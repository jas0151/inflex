<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inflex Trades — Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="inflex.css">
<script>if(localStorage.getItem('inflex-dark-mode')==='true')document.documentElement.classList.add('dark');</script>
<style>
  .login-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }
  .login-card {
    width: 100%;
    max-width: 400px;
    border: 1px solid var(--rule);
    background: var(--paper);
  }
  .login-header {
    padding: 32px 32px 0;
    text-align: center;
  }
  .login-logo {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--ink);
    margin-bottom: 8px;
  }
  .login-logo span { color: var(--accent); }
  .login-subtitle {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .login-body {
    padding: 32px;
  }
  .login-field {
    margin-bottom: 20px;
  }
  .login-field label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    display: block;
    margin-bottom: 6px;
  }
  .login-field input {
    width: 100%;
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    padding: 12px 14px;
    border: 1px solid var(--rule);
    background: var(--paper);
    color: var(--ink);
    outline: none;
    transition: border-color 0.2s;
  }
  .login-field input:focus { border-color: var(--ink); }
  html.dark .login-field input { background: var(--paper2); border-color: var(--rule); color: var(--ink); }
  .login-btn {
    width: 100%;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    background: var(--ink);
    color: var(--paper);
    border: none;
    padding: 14px 28px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .login-btn:hover { background: var(--accent); }
  .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .login-error {
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    color: var(--accent);
    text-align: center;
    margin-bottom: 16px;
    min-height: 20px;
  }
  .login-footer {
    padding: 16px 32px;
    border-top: 1px solid var(--rule);
    text-align: center;
  }
  .login-footer a {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.2s;
  }
  .login-footer a:hover { color: var(--ink); }
  .setup-notice {
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    margin-bottom: 16px;
    padding: 12px;
    background: rgba(200, 0, 26, 0.05);
    border: 1px solid rgba(200, 0, 26, 0.15);
  }
  .dark-toggle-login {
    position: fixed;
    top: 20px;
    right: 20px;
  }
  .password-strength {
    height: 3px;
    margin-top: 6px;
    background: var(--rule);
    overflow: hidden;
  }
  .password-strength-bar {
    height: 100%;
    width: 0%;
    transition: width 0.3s, background 0.3s;
  }
  .pw-weak { width: 33%; background: var(--accent); }
  .pw-medium { width: 66%; background: #f59e0b; }
  .pw-strong { width: 100%; background: #16a34a; }
</style>
</head>
<body>

<div class="dark-toggle-login">
  <button class="dark-toggle" onclick="toggleDarkMode()" title="Toggle dark mode">
    <svg class="icon-moon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
    <svg class="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>
</div>

<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">Inflex<span>.</span></div>
      <div class="login-subtitle" id="loginSubtitle">Admin Dashboard</div>
    </div>
    <div class="login-body">
      <div class="login-error" id="loginError"></div>

      <!-- Setup form (only shown if no admin exists) -->
      <div id="setupNotice" class="setup-notice" style="display:none;">
        No admin account found. Create your first admin account below.
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="login-field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="username" required>
        </div>
        <div class="login-field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
          <div class="password-strength" id="pwStrength" style="display:none;">
            <div class="password-strength-bar" id="pwStrengthBar"></div>
          </div>
        </div>
        <div class="login-field" id="confirmField" style="display:none;">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" name="confirmPassword" autocomplete="new-password">
        </div>
        <button type="submit" class="login-btn" id="loginBtn">Sign In</button>
      </form>
    </div>
    <div class="login-footer">
      <a href="/">&larr; Back to Inflex Trades</a>
    </div>
  </div>
</div>

<script>
let isSetupMode = false;

// Check if already authenticated
const existingToken = localStorage.getItem('inflex-admin-token');
if (existingToken) {
  fetch('/api/auth/me', {
    headers: { 'Authorization': 'Bearer ' + existingToken }
  }).then(r => {
    if (r.ok) window.location.href = '/admin.html';
  });
}

// Check if admin exists
async function checkSetup() {
  try {
    const res = await fetch('/api/auth/check-setup');
    const data = await res.json();
    if (!data.adminExists) {
      isSetupMode = true;
      document.getElementById('setupNotice').style.display = 'block';
      document.getElementById('confirmField').style.display = 'block';
      document.getElementById('loginBtn').textContent = 'Create Admin Account';
      document.getElementById('loginSubtitle').textContent = 'Initial Setup';
      document.getElementById('pwStrength').style.display = 'block';
      document.getElementById('password').autocomplete = 'new-password';
    }
  } catch (e) {
    console.error('Setup check failed:', e);
  }
}

checkSetup();

// Password strength indicator
document.getElementById('password').addEventListener('input', function() {
  if (!isSetupMode) return;
  const bar = document.getElementById('pwStrengthBar');
  const pw = this.value;
  bar.className = 'password-strength-bar';
  if (pw.length >= 12 && /[A-Z]/.test(pw) && /[0-9]/.test(pw) && /[^a-zA-Z0-9]/.test(pw)) {
    bar.classList.add('pw-strong');
  } else if (pw.length >= 8 && (/[A-Z]/.test(pw) || /[0-9]/.test(pw))) {
    bar.classList.add('pw-medium');
  } else if (pw.length >= 4) {
    bar.classList.add('pw-weak');
  }
});

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  const errorEl = document.getElementById('loginError');
  errorEl.textContent = '';
  btn.disabled = true;
  btn.textContent = isSetupMode ? 'Creating...' : 'Signing in...';

  const username = document.getElementById('username').value.trim();
  const password = document.getElementById('password').value;

  try {
    if (isSetupMode) {
      const confirm = document.getElementById('confirmPassword').value;
      if (password !== confirm) {
        errorEl.textContent = 'Passwords do not match';
        btn.disabled = false;
        btn.textContent = 'Create Admin Account';
        return;
      }
      if (password.length < 8) {
        errorEl.textContent = 'Password must be at least 8 characters';
        btn.disabled = false;
        btn.textContent = 'Create Admin Account';
        return;
      }

      // Create admin account
      const setupRes = await fetch('/api/auth/setup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const setupData = await setupRes.json();
      if (!setupRes.ok) {
        errorEl.textContent = setupData.error;
        btn.disabled = false;
        btn.textContent = 'Create Admin Account';
        return;
      }
      // Account created, now login
    }

    // Login
    const loginRes = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const loginData = await loginRes.json();

    if (!loginRes.ok) {
      errorEl.textContent = loginData.error;
      btn.disabled = false;
      btn.textContent = isSetupMode ? 'Create Admin Account' : 'Sign In';
      return;
    }

    // Store token and redirect
    localStorage.setItem('inflex-admin-token', loginData.token);
    localStorage.setItem('inflex-admin-user', loginData.username);
    window.location.href = '/admin.html';
  } catch (err) {
    errorEl.textContent = 'Connection error. Please try again.';
    btn.disabled = false;
    btn.textContent = isSetupMode ? 'Create Admin Account' : 'Sign In';
  }
}

function toggleDarkMode() {
  const isDark = document.documentElement.classList.toggle('dark');
  localStorage.setItem('inflex-dark-mode', isDark);
}
</script>
</body>
</html>
