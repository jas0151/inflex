<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inflex Admin — Article Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --surface3: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text2: #8b949e;
    --accent: #c8001a;
    --accent-hover: #e0001e;
    --green: #3fb950;
    --yellow: #d29922;
    --blue: #58a6ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Top bar ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .topbar-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
  }
  .topbar-stats {
    font-size: 12px;
    color: var(--text2);
    padding: 3px 10px;
    background: var(--surface2);
    border-radius: 4px;
  }
  .topbar-links a {
    color: var(--text2);
    text-decoration: none;
    font-size: 13px;
    margin-left: 16px;
    padding: 4px 10px;
    border-radius: 4px;
    transition: all 0.15s;
  }
  .topbar-links a:hover { color: var(--text); background: var(--surface2); }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 300px 1fr;
    min-height: calc(100vh - 45px);
  }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  .sidebar-header {
    padding: 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .sidebar-header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .sidebar-header h2 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text2);
  }
  .btn-new {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 5px 12px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .btn-new:hover { background: var(--accent-hover); }
  .sidebar-search {
    width: 100%;
    padding: 7px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    outline: none;
  }
  .sidebar-search:focus { border-color: var(--accent); }
  .sidebar-search::placeholder { color: var(--text2); }
  .sidebar-filters {
    display: flex;
    gap: 4px;
  }
  .filter-btn {
    background: none;
    border: 1px solid transparent;
    color: var(--text2);
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 3px;
    cursor: pointer;
    font-family: inherit;
  }
  .filter-btn:hover { color: var(--text); }
  .filter-btn.active { color: var(--text); background: var(--surface2); border-color: var(--border); }

  .article-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
  }
  .article-item {
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    margin-bottom: 2px;
    border: 1px solid transparent;
    transition: all 0.1s;
  }
  .article-item:hover { background: var(--surface2); }
  .article-item.active { background: var(--surface2); border-color: var(--accent); }
  .article-item-title {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 4px;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .article-item-meta {
    font-size: 11px;
    color: var(--text2);
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .badge {
    display: inline-block;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .badge-published { background: rgba(63,185,80,0.15); color: var(--green); }
  .badge-draft { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .badge-featured { background: rgba(200,0,26,0.15); color: var(--accent); }

  /* ── Editor ── */
  .editor-wrap {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .editor-area {
    padding: 24px 32px;
    overflow-y: auto;
    flex: 1;
  }
  .editor-inner { max-width: 860px; }
  .editor-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text2);
    gap: 12px;
  }
  .editor-empty-icon { font-size: 48px; opacity: 0.3; }
  .editor-empty-text { font-size: 15px; }
  .editor-empty-hint { font-size: 13px; color: var(--border); }

  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text2);
    margin-bottom: 5px;
  }
  .form-input {
    width: 100%;
    padding: 9px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input-title {
    font-size: 24px;
    font-weight: 700;
    padding: 12px 14px;
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--border);
    border-radius: 0;
  }
  .form-input-title:focus { border-bottom-color: var(--accent); }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .form-row-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    gap: 2px;
    padding: 6px 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 5px 5px 0 0;
    flex-wrap: wrap;
    align-items: center;
  }
  .toolbar-sep {
    width: 1px;
    height: 20px;
    background: var(--border);
    margin: 0 4px;
  }
  .tb {
    background: none;
    border: none;
    color: var(--text2);
    font-size: 13px;
    font-weight: 600;
    padding: 4px 8px;
    border-radius: 3px;
    cursor: pointer;
    font-family: inherit;
    line-height: 1;
    transition: all 0.1s;
  }
  .tb:hover { color: var(--text); background: var(--surface2); }
  .tb-bold { font-weight: 800; }
  .tb-italic { font-style: italic; }

  /* ── Content editor ── */
  .content-wrap {
    position: relative;
  }
  textarea.form-input.content-textarea {
    min-height: 360px;
    resize: vertical;
    line-height: 1.7;
    font-size: 14px;
    border-radius: 0 0 5px 5px;
    font-family: 'Barlow', monospace;
  }
  .content-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 4px;
  }
  .word-count {
    font-size: 11px;
    color: var(--text2);
  }
  .tab-btns {
    display: flex;
    gap: 2px;
  }
  .tab-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text2);
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.1s;
  }
  .tab-btn:first-child { border-radius: 3px 0 0 3px; }
  .tab-btn:last-child { border-radius: 0 3px 3px 0; }
  .tab-btn.active { color: var(--text); background: var(--surface2); }

  /* ── Preview ── */
  .preview-pane {
    display: none;
    min-height: 360px;
    padding: 24px;
    background: #faf8f4;
    border: 1px solid var(--border);
    border-radius: 0 0 5px 5px;
    color: #2a2a28;
    font-size: 15px;
    line-height: 1.75;
    overflow-y: auto;
  }
  .preview-pane h2 { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; margin: 28px 0 12px; color: #1a1a18; }
  .preview-pane h3 { font-size: 18px; font-weight: 700; margin: 24px 0 10px; color: #1a1a18; }
  .preview-pane p { margin-bottom: 14px; }
  .preview-pane strong { font-weight: 700; }
  .preview-pane blockquote { border-left: 3px solid #c8001a; padding: 10px 16px; margin: 16px 0; color: #555; font-style: italic; background: rgba(200,0,26,0.04); }
  .preview-pane pre { background: #1a1a18; color: #e6e6e6; padding: 16px; border-radius: 5px; overflow-x: auto; margin: 16px 0; font-size: 13px; }
  .preview-pane code { background: rgba(0,0,0,0.06); padding: 1px 5px; border-radius: 3px; font-size: 0.9em; }
  .preview-pane pre code { background: none; padding: 0; }
  .preview-pane ul, .preview-pane ol { margin: 12px 0; padding-left: 22px; }
  .preview-pane li { margin-bottom: 6px; }
  .preview-pane a { color: #c8001a; }
  .preview-pane img { max-width: 100%; border-radius: 5px; margin: 14px 0; display: block; }
  .preview-pane figure { margin: 20px 0; }
  .preview-pane figure img { margin-bottom: 6px; }
  .preview-pane figcaption { font-size: 13px; color: #888; text-align: center; font-style: italic; }

  /* ── Cover image ── */
  .cover-upload {
    border: 2px dashed var(--border);
    border-radius: 6px;
    padding: 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
    position: relative;
  }
  .cover-upload:hover { border-color: var(--accent); }
  .cover-upload input { display: none; }
  .cover-upload img {
    max-width: 100%;
    max-height: 160px;
    border-radius: 4px;
  }
  .cover-upload-text { color: var(--text2); font-size: 13px; }
  .cover-remove {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(0,0,0,0.7);
    color: #fff;
    border: none;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    display: none;
  }

  /* ── Checkboxes ── */
  .form-checks {
    display: flex;
    gap: 20px;
    margin-bottom: 16px;
  }
  .form-check {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .form-check input[type="checkbox"] {
    accent-color: var(--accent);
    width: 15px;
    height: 15px;
  }
  .form-check label {
    font-size: 13px;
    text-transform: none;
    letter-spacing: 0;
    color: var(--text);
    margin-bottom: 0;
  }

  /* ── Actions ── */
  .editor-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    align-items: center;
  }
  .btn {
    padding: 9px 18px;
    border-radius: 5px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--surface3); }
  .btn-outline { background: transparent; color: var(--blue); border: 1px solid rgba(88,166,255,0.3); }
  .btn-outline:hover { background: rgba(88,166,255,0.08); }
  .btn-danger { background: transparent; color: #f85149; border: 1px solid #f8514933; margin-left: auto; }
  .btn-danger:hover { background: rgba(248,81,73,0.1); }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--green);
    color: #000;
    padding: 10px 18px;
    border-radius: 5px;
    font-weight: 600;
    font-size: 13px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.25s;
    z-index: 200;
    max-width: 400px;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { max-height: 35vh; }
    .editor-area { padding: 16px; }
    .form-row, .form-row-3 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-title">Inflex Admin</div>
    <div class="topbar-stats" id="articleStats">—</div>
  </div>
  <div class="topbar-links">
    <a href="/">View Site</a>
    <a href="/inflex-terminal.html">Terminal</a>
  </div>
</div>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-header-row">
        <h2>Articles</h2>
        <button class="btn-new" onclick="newArticle()">+ New Article</button>
      </div>
      <input type="text" class="sidebar-search" id="sidebarSearch" placeholder="Search articles..." oninput="renderList()">
      <div class="sidebar-filters">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn" data-filter="published" onclick="setFilter('published',this)">Published</button>
        <button class="filter-btn" data-filter="draft" onclick="setFilter('draft',this)">Drafts</button>
        <button class="filter-btn" data-filter="featured" onclick="setFilter('featured',this)">Featured</button>
      </div>
    </div>
    <div class="article-list" id="articleList">
      <div style="padding:20px;color:var(--text2);text-align:center;font-size:13px;">Loading...</div>
    </div>
  </div>

  <!-- Editor -->
  <div class="editor-wrap">
    <div class="editor-area" id="editorArea">
      <div class="editor-empty" id="editorEmpty">
        <div class="editor-empty-icon">&#9998;</div>
        <div class="editor-empty-text">Select an article or create a new one</div>
        <div class="editor-empty-hint">Use the "+ New Article" button to get started</div>
      </div>

      <div class="editor-inner" id="editorForm" style="display:none">
        <form onsubmit="return saveArticle(event)">
          <input type="hidden" id="articleId">

          <div class="form-group">
            <input type="text" id="articleTitle" class="form-input form-input-title" placeholder="Article title..." required>
          </div>

          <div class="form-row" style="margin-bottom:16px;">
            <div class="form-group" style="margin-bottom:0;">
              <label>Tag / Category</label>
              <input type="text" id="articleTag" class="form-input" placeholder="e.g. DeFi · Analysis">
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label>Author</label>
              <input type="text" id="articleAuthor" class="form-input" placeholder="Inflex Research" value="Inflex Research">
            </div>
          </div>

          <div class="form-group">
            <label>Excerpt</label>
            <textarea id="articleExcerpt" class="form-input" rows="2" placeholder="Short summary shown on the homepage..." style="resize:vertical;line-height:1.5;"></textarea>
          </div>

          <div class="form-group">
            <label>Cover Image</label>
            <div class="cover-upload" id="coverArea" onclick="document.getElementById('coverInput').click()">
              <button type="button" class="cover-remove" id="coverRemove" onclick="removeCover(event)">×</button>
              <img id="coverPreview" style="display:none">
              <div class="cover-upload-text" id="coverText">Click or drag to upload cover image (JPG, PNG, WebP)</div>
              <input type="file" id="coverInput" accept="image/*" onchange="previewCover(this)">
            </div>
          </div>

          <div class="form-group">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;">
              <label style="margin-bottom:0;">Content</label>
              <div class="tab-btns">
                <button type="button" class="tab-btn active" onclick="setTab('write',this)">Write</button>
                <button type="button" class="tab-btn" onclick="setTab('preview',this)">Preview</button>
              </div>
            </div>
            <!-- Formatting toolbar -->
            <div class="toolbar" id="toolbar">
              <button type="button" class="tb tb-bold" onclick="insertTag('strong')" title="Bold">B</button>
              <button type="button" class="tb tb-italic" onclick="insertTag('em')" title="Italic">I</button>
              <div class="toolbar-sep"></div>
              <button type="button" class="tb" onclick="insertTag('h2')" title="Heading 2">H2</button>
              <button type="button" class="tb" onclick="insertTag('h3')" title="Heading 3">H3</button>
              <div class="toolbar-sep"></div>
              <button type="button" class="tb" onclick="insertTag('p')" title="Paragraph">¶</button>
              <button type="button" class="tb" onclick="insertTag('blockquote')" title="Quote">❝</button>
              <button type="button" class="tb" onclick="insertTag('code')" title="Inline code">&lt;/&gt;</button>
              <button type="button" class="tb" onclick="insertBlock('pre')" title="Code block">Pre</button>
              <div class="toolbar-sep"></div>
              <button type="button" class="tb" onclick="insertList('ul')" title="Bullet list">• List</button>
              <button type="button" class="tb" onclick="insertList('ol')" title="Numbered list">1. List</button>
              <div class="toolbar-sep"></div>
              <button type="button" class="tb" onclick="insertLink()" title="Link">Link</button>
              <button type="button" class="tb" onclick="insertImage()" title="Upload image into content">Img</button>
              <input type="file" id="contentImageInput" accept="image/*" style="display:none" onchange="handleContentImage(this)">
            </div>
            <textarea id="articleContent" class="form-input content-textarea" placeholder="Write your article content here using HTML tags for formatting..." required></textarea>
            <div class="preview-pane" id="previewPane"></div>
            <div class="content-footer">
              <div class="word-count" id="wordCount">0 words · 0 min read</div>
            </div>
          </div>

          <div class="form-checks">
            <div class="form-check">
              <input type="checkbox" id="articleFeatured">
              <label for="articleFeatured">Featured article</label>
            </div>
            <div class="form-check">
              <input type="checkbox" id="articlePublished" checked>
              <label for="articlePublished">Published</label>
            </div>
          </div>

          <div class="editor-actions">
            <button type="submit" class="btn btn-primary" id="saveBtn">Publish Article</button>
            <button type="button" class="btn btn-outline" id="previewSiteBtn" style="display:none" onclick="openPreview()">View on site</button>
            <button type="button" class="btn btn-secondary" onclick="cancelEdit()">Cancel</button>
            <button type="button" class="btn btn-danger" id="deleteBtn" onclick="deleteArticle()" style="display:none">Delete</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let articles = [];
let currentId = null;
let currentFilter = 'all';
let pendingCoverBase64 = null;
let currentSlug = null;

// ── Load articles ──
async function loadArticles() {
  try {
    const res = await fetch('/api/articles/all');
    articles = await res.json();
    updateStats();
    renderList();
  } catch (e) {
    document.getElementById('articleList').innerHTML =
      '<div style="padding:20px;color:#f85149;text-align:center;font-size:13px;">Failed to load articles. Check database connection.</div>';
  }
}

function updateStats() {
  const pub = articles.filter(a => a.published).length;
  const drafts = articles.filter(a => !a.published).length;
  document.getElementById('articleStats').textContent = `${pub} published · ${drafts} drafts`;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList() {
  const list = document.getElementById('articleList');
  const search = document.getElementById('sidebarSearch').value.toLowerCase();

  let filtered = articles.filter(a => {
    if (currentFilter === 'published' && !a.published) return false;
    if (currentFilter === 'draft' && a.published) return false;
    if (currentFilter === 'featured' && !a.is_featured) return false;
    if (search && !a.title.toLowerCase().includes(search) && !(a.tag||'').toLowerCase().includes(search)) return false;
    return true;
  });

  if (!filtered.length) {
    const msg = search ? 'No matching articles' : (articles.length ? 'No articles match this filter' : 'No articles yet');
    list.innerHTML = `<div style="padding:20px;color:var(--text2);text-align:center;font-size:13px;">${msg}</div>`;
    return;
  }

  list.innerHTML = filtered.map(a => `
    <div class="article-item ${a.id === currentId ? 'active' : ''}" onclick="editArticle(${a.id})">
      <div class="article-item-title">${escHtml(a.title)}</div>
      <div class="article-item-meta">
        <span>${formatDate(a.created_at)}</span>
        ${a.is_featured ? '<span class="badge badge-featured">Featured</span>' : ''}
        <span class="badge ${a.published ? 'badge-published' : 'badge-draft'}">${a.published ? 'Live' : 'Draft'}</span>
      </div>
    </div>
  `).join('');
}

// ── New article ──
function newArticle() {
  currentId = null;
  currentSlug = null;
  pendingCoverBase64 = null;
  showEditor();
  document.getElementById('deleteBtn').style.display = 'none';
  document.getElementById('previewSiteBtn').style.display = 'none';
  document.getElementById('saveBtn').textContent = 'Publish Article';
  document.getElementById('articleId').value = '';
  document.getElementById('articleTitle').value = '';
  document.getElementById('articleTag').value = '';
  document.getElementById('articleAuthor').value = 'Inflex Research';
  document.getElementById('articleExcerpt').value = '';
  document.getElementById('articleContent').value = '';
  document.getElementById('articleFeatured').checked = false;
  document.getElementById('articlePublished').checked = true;
  clearCover();
  setTab('write', document.querySelector('.tab-btn'));
  updateWordCount();
  renderList();
  document.getElementById('articleTitle').focus();
}

// ── Edit article ──
function editArticle(id) {
  const a = articles.find(x => x.id === id);
  if (!a) return;
  currentId = id;
  currentSlug = a.slug;
  pendingCoverBase64 = null;
  showEditor();
  document.getElementById('deleteBtn').style.display = 'inline-block';
  document.getElementById('previewSiteBtn').style.display = 'inline-block';
  document.getElementById('saveBtn').textContent = 'Save Changes';
  document.getElementById('articleId').value = a.id;
  document.getElementById('articleTitle').value = a.title;
  document.getElementById('articleTag').value = a.tag || '';
  document.getElementById('articleAuthor').value = a.author || 'Inflex Research';
  document.getElementById('articleExcerpt').value = a.excerpt || '';
  document.getElementById('articleContent').value = a.content || '';
  document.getElementById('articleFeatured').checked = !!a.is_featured;
  document.getElementById('articlePublished').checked = a.published !== false;

  if (a.cover_image) {
    document.getElementById('coverPreview').src = a.cover_image;
    document.getElementById('coverPreview').style.display = 'block';
    document.getElementById('coverText').style.display = 'none';
    document.getElementById('coverRemove').style.display = 'block';
  } else {
    clearCover();
  }
  document.getElementById('coverInput').value = '';
  setTab('write', document.querySelector('.tab-btn'));
  updateWordCount();
  renderList();
}

function showEditor() {
  document.getElementById('editorEmpty').style.display = 'none';
  document.getElementById('editorForm').style.display = 'block';
}

// ── Save article ──
async function saveArticle(e) {
  e.preventDefault();
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  const body = {
    title: document.getElementById('articleTitle').value,
    tag: document.getElementById('articleTag').value,
    author: document.getElementById('articleAuthor').value,
    excerpt: document.getElementById('articleExcerpt').value,
    content: document.getElementById('articleContent').value,
    is_featured: document.getElementById('articleFeatured').checked,
    published: document.getElementById('articlePublished').checked
  };

  if (pendingCoverBase64) {
    body.cover_image = pendingCoverBase64;
  }

  const id = document.getElementById('articleId').value;
  const url = id ? `/api/articles/${id}` : '/api/articles';
  const method = id ? 'PUT' : 'POST';

  try {
    const res = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      let errMsg = 'Failed to save';
      try { const err = await res.json(); errMsg = err.error || errMsg; } catch { errMsg = await res.text() || errMsg; }
      throw new Error(errMsg);
    }
    const saved = await res.json();
    currentId = saved.id;
    currentSlug = saved.slug;
    showToast(id ? 'Article saved!' : 'Article published!');
    await loadArticles();
    editArticle(saved.id);
  } catch (err) {
    showToast(err.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = id ? 'Save Changes' : 'Publish Article';
  }
}

// ── Delete article ──
async function deleteArticle() {
  const id = document.getElementById('articleId').value;
  if (!id) return;
  if (!confirm('Delete this article permanently?')) return;

  try {
    const res = await fetch(`/api/articles/${id}`, { method: 'DELETE' });
    if (!res.ok) throw new Error('Delete failed');
    currentId = null;
    currentSlug = null;
    showToast('Article deleted');
    cancelEdit();
    await loadArticles();
  } catch (err) {
    showToast('Failed to delete', true);
  }
}

// ── Cancel ──
function cancelEdit() {
  currentId = null;
  currentSlug = null;
  document.getElementById('editorForm').style.display = 'none';
  document.getElementById('editorEmpty').style.display = 'flex';
  renderList();
}

// ── Preview on site ──
function openPreview() {
  if (currentSlug) window.open(`/article.html?slug=${encodeURIComponent(currentSlug)}`, '_blank');
}

// ── Cover image ──
function previewCover(input) {
  if (input.files && input.files[0]) {
    const file = input.files[0];
    if (file.size > 5 * 1024 * 1024) {
      showToast('Image too large (max 5MB)', true);
      return;
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      pendingCoverBase64 = e.target.result;
      document.getElementById('coverPreview').src = e.target.result;
      document.getElementById('coverPreview').style.display = 'block';
      document.getElementById('coverText').style.display = 'none';
      document.getElementById('coverRemove').style.display = 'block';
    };
    reader.readAsDataURL(file);
  }
}

function removeCover(e) {
  e.stopPropagation();
  pendingCoverBase64 = '';
  clearCover();
}

function clearCover() {
  document.getElementById('coverPreview').style.display = 'none';
  document.getElementById('coverText').style.display = 'block';
  document.getElementById('coverRemove').style.display = 'none';
}

// ── Formatting toolbar ──
function insertTag(tag) {
  const ta = document.getElementById('articleContent');
  const start = ta.selectionStart;
  const end = ta.selectionEnd;
  const selected = ta.value.substring(start, end);
  const text = selected || 'text';
  const insert = `<${tag}>${text}</${tag}>`;
  ta.setRangeText(insert, start, end, 'select');
  ta.focus();
  updateWordCount();
}

function insertBlock(tag) {
  const ta = document.getElementById('articleContent');
  const start = ta.selectionStart;
  const selected = ta.value.substring(ta.selectionStart, ta.selectionEnd);
  const text = selected || 'code here';
  const insert = `\n<${tag}><code>${text}</code></${tag}>\n`;
  ta.setRangeText(insert, start, ta.selectionEnd, 'end');
  ta.focus();
  updateWordCount();
}

function insertList(tag) {
  const ta = document.getElementById('articleContent');
  const start = ta.selectionStart;
  const insert = `\n<${tag}>\n  <li>Item 1</li>\n  <li>Item 2</li>\n  <li>Item 3</li>\n</${tag}>\n`;
  ta.setRangeText(insert, start, ta.selectionEnd, 'end');
  ta.focus();
  updateWordCount();
}

function insertLink() {
  const url = prompt('Enter URL:');
  if (!url) return;
  const ta = document.getElementById('articleContent');
  const start = ta.selectionStart;
  const selected = ta.value.substring(ta.selectionStart, ta.selectionEnd);
  const text = selected || 'link text';
  const insert = `<a href="${url}">${text}</a>`;
  ta.setRangeText(insert, start, ta.selectionEnd, 'select');
  ta.focus();
}

function insertImage() {
  // Open file picker — the file input's onchange calls handleContentImage
  document.getElementById('contentImageInput').click();
}

function handleContentImage(input) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];
  if (file.size > 5 * 1024 * 1024) {
    showToast('Image too large (max 5MB)', true);
    input.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    const base64 = e.target.result;
    const caption = prompt('Image caption (optional):') || '';
    const ta = document.getElementById('articleContent');
    const pos = ta.selectionStart;
    let insert;
    if (caption) {
      insert = `\n<figure>\n  <img src="${base64}" alt="${caption.replace(/"/g, '&quot;')}">\n  <figcaption>${caption}</figcaption>\n</figure>\n`;
    } else {
      insert = `\n<img src="${base64}" alt="">\n`;
    }
    ta.setRangeText(insert, pos, ta.selectionEnd, 'end');
    ta.focus();
    updateWordCount();
  };
  reader.readAsDataURL(file);
  input.value = '';
}

// ── Tabs (Write / Preview) ──
function setTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  const ta = document.getElementById('articleContent');
  const preview = document.getElementById('previewPane');
  const toolbar = document.getElementById('toolbar');

  if (tab === 'write') {
    ta.style.display = 'block';
    preview.style.display = 'none';
    toolbar.style.display = 'flex';
  } else {
    ta.style.display = 'none';
    preview.style.display = 'block';
    toolbar.style.display = 'none';
    preview.innerHTML = ta.value || '<span style="color:#aaa;">Nothing to preview</span>';
  }
}

// ── Word count ──
function updateWordCount() {
  const content = document.getElementById('articleContent').value;
  const text = content.replace(/<[^>]*>/g, ' ').replace(/\s+/g, ' ').trim();
  const words = text ? text.split(' ').length : 0;
  const mins = Math.ceil(words / 200);
  document.getElementById('wordCount').textContent = `${words} words · ${mins} min read`;
}

// ── Helpers ──
function escHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function formatDate(str) {
  if (!str) return '';
  const d = new Date(str);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? '#f85149' : 'var(--green)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    if (document.getElementById('editorForm').style.display !== 'none') {
      document.getElementById('editorForm').querySelector('form').requestSubmit();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
    e.preventDefault();
    newArticle();
  }
});

// ── Content change listener ──
document.getElementById('articleContent').addEventListener('input', updateWordCount);

// ── Drag & drop cover image ──
const coverArea = document.getElementById('coverArea');
coverArea.addEventListener('dragover', (e) => { e.preventDefault(); coverArea.style.borderColor = 'var(--accent)'; });
coverArea.addEventListener('dragleave', () => { coverArea.style.borderColor = ''; });
coverArea.addEventListener('drop', (e) => {
  e.preventDefault();
  coverArea.style.borderColor = '';
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    const input = document.getElementById('coverInput');
    const dt = new DataTransfer();
    dt.items.add(file);
    input.files = dt.files;
    previewCover(input);
  }
});

// ── Init ──
loadArticles();
</script>
</body>
</html>
