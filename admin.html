<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inflex Admin — Article Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1c2333;
    --surface3: #21262d;
    --border: #30363d;
    --text: #e6edf3;
    --text2: #8b949e;
    --accent: #c8001a;
    --accent-hover: #e0001e;
    --green: #3fb950;
    --yellow: #d29922;
    --blue: #58a6ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Top bar ── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .topbar-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--accent);
  }
  .topbar-stats {
    font-size: 12px;
    color: var(--text2);
    padding: 3px 10px;
    background: var(--surface2);
    border-radius: 4px;
  }
  .topbar-links a {
    color: var(--text2);
    text-decoration: none;
    font-size: 13px;
    margin-left: 16px;
    padding: 4px 10px;
    border-radius: 4px;
    transition: all 0.15s;
  }
  .topbar-links a:hover { color: var(--text); background: var(--surface2); }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 300px 1fr;
    min-height: calc(100vh - 45px);
  }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  .sidebar-header {
    padding: 12px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .sidebar-header-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .sidebar-header h2 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text2);
  }
  .btn-new {
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 5px 12px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
  }
  .btn-new:hover { background: var(--accent-hover); }
  .sidebar-search {
    width: 100%;
    padding: 7px 10px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    outline: none;
  }
  .sidebar-search:focus { border-color: var(--accent); }
  .sidebar-search::placeholder { color: var(--text2); }
  .sidebar-filters {
    display: flex;
    gap: 4px;
  }
  .filter-btn {
    background: none;
    border: 1px solid transparent;
    color: var(--text2);
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 3px;
    cursor: pointer;
    font-family: inherit;
  }
  .filter-btn:hover { color: var(--text); }
  .filter-btn.active { color: var(--text); background: var(--surface2); border-color: var(--border); }

  .article-list {
    flex: 1;
    overflow-y: auto;
    padding: 6px;
  }
  .article-item {
    padding: 10px 12px;
    border-radius: 6px;
    cursor: pointer;
    margin-bottom: 2px;
    border: 1px solid transparent;
    transition: all 0.1s;
  }
  .article-item:hover { background: var(--surface2); }
  .article-item.active { background: var(--surface2); border-color: var(--accent); }
  .article-item-title {
    font-size: 13px;
    font-weight: 600;
    margin-bottom: 4px;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .article-item-meta {
    font-size: 11px;
    color: var(--text2);
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .badge {
    display: inline-block;
    padding: 1px 5px;
    border-radius: 3px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .badge-published { background: rgba(63,185,80,0.15); color: var(--green); }
  .badge-draft { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .badge-featured { background: rgba(200,0,26,0.15); color: var(--accent); }

  /* ── Editor ── */
  .editor-wrap {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .editor-area {
    padding: 24px 32px;
    overflow-y: auto;
    flex: 1;
  }
  .editor-inner { max-width: 860px; }
  .editor-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text2);
    gap: 12px;
  }
  .editor-empty-icon { font-size: 48px; opacity: 0.3; }
  .editor-empty-text { font-size: 15px; }
  .editor-empty-hint { font-size: 13px; color: var(--border); }

  .form-group { margin-bottom: 16px; }
  .form-group label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text2);
    margin-bottom: 5px;
  }
  .form-input {
    width: 100%;
    padding: 9px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color 0.15s;
  }
  .form-input:focus { border-color: var(--accent); }
  .form-input-title {
    font-size: 24px;
    font-weight: 700;
    padding: 12px 14px;
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--border);
    border-radius: 0;
  }
  .form-input-title:focus { border-bottom-color: var(--accent); }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .form-row-3 {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }

  /* ── Toolbar ── */
  .toolbar {
    display: flex;
    gap: 1px;
    padding: 5px 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom: none;
    border-radius: 5px 5px 0 0;
    flex-wrap: wrap;
    align-items: center;
  }
  .toolbar-sep {
    width: 1px;
    height: 20px;
    background: var(--border);
    margin: 0 5px;
  }
  .tb {
    background: none;
    border: none;
    color: var(--text2);
    font-size: 13px;
    font-weight: 600;
    padding: 5px 9px;
    border-radius: 3px;
    cursor: pointer;
    font-family: inherit;
    line-height: 1;
    transition: all 0.1s;
  }
  .tb:hover { color: var(--text); background: var(--surface2); }
  .tb.active { color: var(--accent); background: var(--surface2); }
  .tb-bold { font-weight: 800; }
  .tb-italic { font-style: italic; }

  /* ── WYSIWYG editor ── */
  .editor-content {
    min-height: 420px;
    max-height: 70vh;
    overflow-y: auto;
    padding: 24px;
    background: #faf8f4;
    border: 1px solid var(--border);
    border-radius: 0 0 5px 5px;
    color: #292929;
    font-family: 'Barlow', sans-serif;
    font-size: 16px;
    line-height: 1.8;
    outline: none;
    cursor: text;
  }
  .editor-content:focus {
    border-color: var(--accent);
  }
  .editor-content:empty::before {
    content: attr(data-placeholder);
    color: #b5b0a8;
    pointer-events: none;
  }
  .editor-content h2 {
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    margin: 32px 0 12px;
    color: #1a1a18;
    line-height: 1.25;
  }
  .editor-content h3 {
    font-size: 20px;
    font-weight: 700;
    margin: 28px 0 10px;
    color: #1a1a18;
  }
  .editor-content p {
    margin-bottom: 16px;
  }
  .editor-content strong { font-weight: 700; }
  .editor-content blockquote {
    border-left: 3px solid #c8001a;
    padding: 8px 18px;
    margin: 20px 0;
    color: #555;
    font-style: italic;
    background: rgba(200,0,26,0.04);
  }
  .editor-content pre {
    background: #1a1a18;
    color: #e6e6e6;
    padding: 18px;
    border-radius: 6px;
    overflow-x: auto;
    margin: 20px 0;
    font-size: 13px;
    line-height: 1.5;
    font-family: monospace;
  }
  .editor-content code {
    background: rgba(0,0,0,0.06);
    padding: 2px 5px;
    border-radius: 3px;
    font-size: 0.9em;
    font-family: monospace;
  }
  .editor-content pre code {
    background: none;
    padding: 0;
  }
  .editor-content ul, .editor-content ol {
    margin: 14px 0;
    padding-left: 24px;
  }
  .editor-content li { margin-bottom: 6px; }
  .editor-content a { color: #c8001a; text-decoration: underline; }
  .editor-content img {
    max-width: 100%;
    border-radius: 6px;
    margin: 20px 0;
    display: block;
    cursor: default;
  }
  .editor-content figure {
    margin: 24px 0;
    position: relative;
  }
  .editor-content figure img {
    margin: 0;
    width: 100%;
  }
  .editor-content figcaption {
    font-size: 13px;
    color: #999;
    text-align: center;
    margin-top: 8px;
    font-style: italic;
    outline: none;
  }
  .editor-content figcaption:empty::before {
    content: 'Add a caption...';
    color: #ccc;
  }
  .editor-content hr {
    border: none;
    height: 1px;
    background: #ddd;
    margin: 32px 0;
  }

  /* Image hover controls */
  .editor-content figure:hover .img-remove,
  .editor-content img:hover + .img-remove,
  .editor-content .img-remove:hover {
    opacity: 1;
  }

  .content-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 6px;
  }
  .word-count {
    font-size: 11px;
    color: var(--text2);
  }
  .content-hint {
    font-size: 11px;
    color: var(--text2);
  }

  /* ── Cover image ── */
  .cover-upload {
    border: 2px dashed var(--border);
    border-radius: 6px;
    padding: 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
    position: relative;
  }
  .cover-upload:hover { border-color: var(--accent); }
  .cover-upload input { display: none; }
  .cover-upload img {
    max-width: 100%;
    max-height: 160px;
    border-radius: 4px;
  }
  .cover-upload-text { color: var(--text2); font-size: 13px; }
  .cover-remove {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(0,0,0,0.7);
    color: #fff;
    border: none;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 14px;
    display: none;
  }

  /* ── Checkboxes ── */
  .form-checks {
    display: flex;
    gap: 20px;
    margin-bottom: 16px;
  }
  .form-check {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .form-check input[type="checkbox"] {
    accent-color: var(--accent);
    width: 15px;
    height: 15px;
  }
  .form-check label {
    font-size: 13px;
    text-transform: none;
    letter-spacing: 0;
    color: var(--text);
    margin-bottom: 0;
  }

  /* ── Actions ── */
  .editor-actions {
    display: flex;
    gap: 10px;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    align-items: center;
  }
  .btn {
    padding: 9px 18px;
    border-radius: 5px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--surface3); }
  .btn-outline { background: transparent; color: var(--blue); border: 1px solid rgba(88,166,255,0.3); }
  .btn-outline:hover { background: rgba(88,166,255,0.08); }
  .btn-danger { background: transparent; color: #f85149; border: 1px solid #f8514933; margin-left: auto; }
  .btn-danger:hover { background: rgba(248,81,73,0.1); }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: var(--green);
    color: #000;
    padding: 10px 18px;
    border-radius: 5px;
    font-weight: 600;
    font-size: 13px;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.25s;
    z-index: 200;
    max-width: 400px;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { max-height: 35vh; }
    .editor-area { padding: 16px; }
    .form-row, .form-row-3 { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="topbar-title">Inflex Admin</div>
    <div class="topbar-stats" id="articleStats">—</div>
  </div>
  <div class="topbar-links">
    <a href="/">View Site</a>
    <a href="/inflex-terminal.html">Terminal</a>
  </div>
</div>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-header-row">
        <h2>Articles</h2>
        <button class="btn-new" onclick="newArticle()">+ New Article</button>
      </div>
      <input type="text" class="sidebar-search" id="sidebarSearch" placeholder="Search articles..." oninput="renderList()">
      <div class="sidebar-filters">
        <button class="filter-btn active" data-filter="all" onclick="setFilter('all',this)">All</button>
        <button class="filter-btn" data-filter="published" onclick="setFilter('published',this)">Published</button>
        <button class="filter-btn" data-filter="draft" onclick="setFilter('draft',this)">Drafts</button>
        <button class="filter-btn" data-filter="featured" onclick="setFilter('featured',this)">Featured</button>
      </div>
    </div>
    <div class="article-list" id="articleList">
      <div style="padding:20px;color:var(--text2);text-align:center;font-size:13px;">Loading...</div>
    </div>
  </div>

  <!-- Editor -->
  <div class="editor-wrap">
    <div class="editor-area" id="editorArea">
      <div class="editor-empty" id="editorEmpty">
        <div class="editor-empty-icon">&#9998;</div>
        <div class="editor-empty-text">Select an article or create a new one</div>
        <div class="editor-empty-hint">Use the "+ New Article" button to get started</div>
      </div>

      <div class="editor-inner" id="editorForm" style="display:none">
        <form onsubmit="return saveArticle(event)">
          <input type="hidden" id="articleId">

          <div class="form-group">
            <input type="text" id="articleTitle" class="form-input form-input-title" placeholder="Article title..." required>
          </div>

          <div class="form-row" style="margin-bottom:16px;">
            <div class="form-group" style="margin-bottom:0;">
              <label>Tag / Category</label>
              <input type="text" id="articleTag" class="form-input" placeholder="e.g. DeFi · Analysis">
            </div>
            <div class="form-group" style="margin-bottom:0;">
              <label>Author</label>
              <input type="text" id="articleAuthor" class="form-input" placeholder="Inflex Research" value="Inflex Research">
            </div>
          </div>

          <div class="form-group">
            <label>Excerpt</label>
            <textarea id="articleExcerpt" class="form-input" rows="2" placeholder="Short summary shown on the homepage..." style="resize:vertical;line-height:1.5;"></textarea>
          </div>

          <div class="form-group">
            <label>Cover Image</label>
            <div class="cover-upload" id="coverArea" onclick="document.getElementById('coverInput').click()">
              <button type="button" class="cover-remove" id="coverRemove" onclick="removeCover(event)">×</button>
              <img id="coverPreview" style="display:none">
              <div class="cover-upload-text" id="coverText">Click or drag to upload cover image (JPG, PNG, WebP)</div>
              <input type="file" id="coverInput" accept="image/*" onchange="previewCover(this)">
            </div>
          </div>

          <div class="form-group">
            <label>Content</label>
            <!-- Formatting toolbar -->
            <div class="toolbar" id="toolbar">
              <button type="button" class="tb tb-bold" onmousedown="execFmt(event,'bold')" title="Bold (Ctrl+B)">B</button>
              <button type="button" class="tb tb-italic" onmousedown="execFmt(event,'italic')" title="Italic (Ctrl+I)">I</button>
              <button type="button" class="tb" onmousedown="execFmt(event,'underline')" title="Underline (Ctrl+U)" style="text-decoration:underline;">U</button>
              <div class="toolbar-sep"></div>
              <button type="button" class="tb" onmousedown="execBlock(event,'h2')" title="Heading 2">H2</button>
              <button type="button" class="tb" onmousedown="execBlock(event,'h3')" title="Heading 3">H3</button>
              <button type="button" class="tb" onmousedown="execBlock(event,'p')" title="Paragraph">P</button>
              <div class="toolbar-sep"></div>
              <button type="button" class="tb" onmousedown="execFmt(event,'insertUnorderedList')" title="Bullet list">&#8226; List</button>
              <button type="button" class="tb" onmousedown="execFmt(event,'insertOrderedList')" title="Numbered list">1. List</button>
              <button type="button" class="tb" onmousedown="execBlock(event,'blockquote')" title="Quote">&#10077;</button>
              <div class="toolbar-sep"></div>
              <button type="button" class="tb" onmousedown="execLink(event)" title="Insert link">Link</button>
              <button type="button" class="tb" onmousedown="execInsertImage(event)" title="Upload image">&#128247; Image</button>
              <button type="button" class="tb" onmousedown="execHR(event)" title="Horizontal rule">&#8212;</button>
              <input type="file" id="contentImageInput" accept="image/*" style="display:none" multiple>
            </div>
            <!-- WYSIWYG contenteditable editor -->
            <div class="editor-content" id="articleContent" contenteditable="true" data-placeholder="Start writing your article... &#10;&#10;Just type naturally. Use the toolbar or keyboard shortcuts (Ctrl+B for bold, Ctrl+I for italic). Drag & drop or paste images directly."></div>
            <div class="content-footer">
              <div class="word-count" id="wordCount">0 words · 0 min read</div>
              <div class="content-hint">Paste or drop images anywhere · Ctrl+B bold · Ctrl+I italic</div>
            </div>
          </div>

          <div class="form-checks">
            <div class="form-check">
              <input type="checkbox" id="articleFeatured">
              <label for="articleFeatured">Featured article</label>
            </div>
            <div class="form-check">
              <input type="checkbox" id="articlePublished" checked>
              <label for="articlePublished">Published</label>
            </div>
          </div>

          <div class="editor-actions">
            <button type="submit" class="btn btn-primary" id="saveBtn">Publish Article</button>
            <button type="button" class="btn btn-outline" id="previewSiteBtn" style="display:none" onclick="openPreview()">View on site</button>
            <button type="button" class="btn btn-secondary" onclick="cancelEdit()">Cancel</button>
            <button type="button" class="btn btn-danger" id="deleteBtn" onclick="deleteArticle()" style="display:none">Delete</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let articles = [];
let currentId = null;
let currentFilter = 'all';
let pendingCoverBase64 = null;
let currentSlug = null;

// ── Load articles ──
async function loadArticles() {
  try {
    const res = await fetch('/api/articles/all');
    articles = await res.json();
    updateStats();
    renderList();
  } catch (e) {
    document.getElementById('articleList').innerHTML =
      '<div style="padding:20px;color:#f85149;text-align:center;font-size:13px;">Failed to load articles. Check database connection.</div>';
  }
}

function updateStats() {
  const pub = articles.filter(a => a.published).length;
  const drafts = articles.filter(a => !a.published).length;
  document.getElementById('articleStats').textContent = `${pub} published · ${drafts} drafts`;
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

function renderList() {
  const list = document.getElementById('articleList');
  const search = document.getElementById('sidebarSearch').value.toLowerCase();

  let filtered = articles.filter(a => {
    if (currentFilter === 'published' && !a.published) return false;
    if (currentFilter === 'draft' && a.published) return false;
    if (currentFilter === 'featured' && !a.is_featured) return false;
    if (search && !a.title.toLowerCase().includes(search) && !(a.tag||'').toLowerCase().includes(search)) return false;
    return true;
  });

  if (!filtered.length) {
    const msg = search ? 'No matching articles' : (articles.length ? 'No articles match this filter' : 'No articles yet');
    list.innerHTML = `<div style="padding:20px;color:var(--text2);text-align:center;font-size:13px;">${msg}</div>`;
    return;
  }

  list.innerHTML = filtered.map(a => `
    <div class="article-item ${a.id === currentId ? 'active' : ''}" onclick="editArticle(${a.id})">
      <div class="article-item-title">${escHtml(a.title)}</div>
      <div class="article-item-meta">
        <span>${formatDate(a.created_at)}</span>
        ${a.is_featured ? '<span class="badge badge-featured">Featured</span>' : ''}
        <span class="badge ${a.published ? 'badge-published' : 'badge-draft'}">${a.published ? 'Live' : 'Draft'}</span>
      </div>
    </div>
  `).join('');
}

// ── New article ──
function newArticle() {
  currentId = null;
  currentSlug = null;
  pendingCoverBase64 = null;
  showEditor();
  document.getElementById('deleteBtn').style.display = 'none';
  document.getElementById('previewSiteBtn').style.display = 'none';
  document.getElementById('saveBtn').textContent = 'Publish Article';
  document.getElementById('articleId').value = '';
  document.getElementById('articleTitle').value = '';
  document.getElementById('articleTag').value = '';
  document.getElementById('articleAuthor').value = 'Inflex Research';
  document.getElementById('articleExcerpt').value = '';
  document.getElementById('articleContent').innerHTML = '';
  document.getElementById('articleFeatured').checked = false;
  document.getElementById('articlePublished').checked = true;
  clearCover();
  updateWordCount();
  renderList();
  document.getElementById('articleTitle').focus();
}

// ── Edit article ──
function editArticle(id) {
  const a = articles.find(x => x.id === id);
  if (!a) return;
  currentId = id;
  currentSlug = a.slug;
  pendingCoverBase64 = null;
  showEditor();
  document.getElementById('deleteBtn').style.display = 'inline-block';
  document.getElementById('previewSiteBtn').style.display = 'inline-block';
  document.getElementById('saveBtn').textContent = 'Save Changes';
  document.getElementById('articleId').value = a.id;
  document.getElementById('articleTitle').value = a.title;
  document.getElementById('articleTag').value = a.tag || '';
  document.getElementById('articleAuthor').value = a.author || 'Inflex Research';
  document.getElementById('articleExcerpt').value = a.excerpt || '';
  document.getElementById('articleContent').innerHTML = a.content || '';
  document.getElementById('articleFeatured').checked = !!a.is_featured;
  document.getElementById('articlePublished').checked = a.published !== false;

  if (a.cover_image) {
    document.getElementById('coverPreview').src = a.cover_image;
    document.getElementById('coverPreview').style.display = 'block';
    document.getElementById('coverText').style.display = 'none';
    document.getElementById('coverRemove').style.display = 'block';
  } else {
    clearCover();
  }
  document.getElementById('coverInput').value = '';
  updateWordCount();
  renderList();
}

function showEditor() {
  document.getElementById('editorEmpty').style.display = 'none';
  document.getElementById('editorForm').style.display = 'block';
}

// ── Save article ──
async function saveArticle(e) {
  e.preventDefault();
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'Saving...';

  const contentHtml = getEditorContent();
  if (!contentHtml || !editor.innerText.trim()) {
    showToast('Please add some content to your article', true);
    btn.disabled = false;
    btn.textContent = currentId ? 'Save Changes' : 'Publish Article';
    editor.focus();
    return;
  }

  const body = {
    title: document.getElementById('articleTitle').value,
    tag: document.getElementById('articleTag').value,
    author: document.getElementById('articleAuthor').value,
    excerpt: document.getElementById('articleExcerpt').value,
    content: contentHtml,
    is_featured: document.getElementById('articleFeatured').checked,
    published: document.getElementById('articlePublished').checked
  };

  if (pendingCoverBase64) {
    body.cover_image = pendingCoverBase64;
  }

  const id = document.getElementById('articleId').value;
  const url = id ? `/api/articles/${id}` : '/api/articles';
  const method = id ? 'PUT' : 'POST';

  try {
    const res = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      let errMsg = 'Failed to save';
      try { const err = await res.json(); errMsg = err.error || errMsg; } catch { errMsg = await res.text() || errMsg; }
      throw new Error(errMsg);
    }
    const saved = await res.json();
    currentId = saved.id;
    currentSlug = saved.slug;
    showToast(id ? 'Article saved!' : 'Article published!');
    await loadArticles();
    editArticle(saved.id);
  } catch (err) {
    showToast(err.message, true);
  } finally {
    btn.disabled = false;
    btn.textContent = id ? 'Save Changes' : 'Publish Article';
  }
}

// ── Delete article ──
async function deleteArticle() {
  const id = document.getElementById('articleId').value;
  if (!id) return;
  if (!confirm('Delete this article permanently?')) return;

  try {
    const res = await fetch(`/api/articles/${id}`, { method: 'DELETE' });
    if (!res.ok) throw new Error('Delete failed');
    currentId = null;
    currentSlug = null;
    showToast('Article deleted');
    cancelEdit();
    await loadArticles();
  } catch (err) {
    showToast('Failed to delete', true);
  }
}

// ── Cancel ──
function cancelEdit() {
  currentId = null;
  currentSlug = null;
  document.getElementById('editorForm').style.display = 'none';
  document.getElementById('editorEmpty').style.display = 'flex';
  renderList();
}

// ── Preview on site ──
function openPreview() {
  if (currentSlug) window.open(`/article.html?slug=${encodeURIComponent(currentSlug)}`, '_blank');
}

// ── Cover image ──
function previewCover(input) {
  if (input.files && input.files[0]) {
    const file = input.files[0];
    if (file.size > 5 * 1024 * 1024) {
      showToast('Image too large (max 5MB)', true);
      return;
    }
    const reader = new FileReader();
    reader.onload = (e) => {
      pendingCoverBase64 = e.target.result;
      document.getElementById('coverPreview').src = e.target.result;
      document.getElementById('coverPreview').style.display = 'block';
      document.getElementById('coverText').style.display = 'none';
      document.getElementById('coverRemove').style.display = 'block';
    };
    reader.readAsDataURL(file);
  }
}

function removeCover(e) {
  e.stopPropagation();
  pendingCoverBase64 = '';
  clearCover();
}

function clearCover() {
  document.getElementById('coverPreview').style.display = 'none';
  document.getElementById('coverText').style.display = 'block';
  document.getElementById('coverRemove').style.display = 'none';
}

// ── WYSIWYG Editor ──
const editor = document.getElementById('articleContent');

function execFmt(e, cmd) {
  e.preventDefault();
  editor.focus();
  document.execCommand(cmd, false, null);
  updateWordCount();
}

function execBlock(e, tag) {
  e.preventDefault();
  editor.focus();
  document.execCommand('formatBlock', false, `<${tag}>`);
  updateWordCount();
}

function execLink(e) {
  e.preventDefault();
  const url = prompt('Enter URL:');
  if (!url) return;
  editor.focus();
  document.execCommand('createLink', false, url);
}

function execHR(e) {
  e.preventDefault();
  editor.focus();
  document.execCommand('insertHorizontalRule', false, null);
  updateWordCount();
}

function execInsertImage(e) {
  e.preventDefault();
  document.getElementById('contentImageInput').click();
}

// Handle file input for images
document.getElementById('contentImageInput').addEventListener('change', function() {
  const files = this.files;
  if (!files.length) return;
  for (const file of files) {
    if (file.size > 5 * 1024 * 1024) {
      showToast('Image too large (max 5MB): ' + file.name, true);
      continue;
    }
    insertImageFile(file);
  }
  this.value = '';
});

function insertImageFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    editor.focus();
    // Create a figure with editable caption
    const figure = document.createElement('figure');
    const img = document.createElement('img');
    img.src = e.target.result;
    img.alt = '';
    const caption = document.createElement('figcaption');
    caption.contentEditable = 'true';
    caption.setAttribute('data-placeholder', 'Add a caption...');
    figure.appendChild(img);
    figure.appendChild(caption);

    // Insert at cursor position
    const sel = window.getSelection();
    if (sel.rangeCount) {
      const range = sel.getRangeAt(0);
      range.deleteContents();
      range.insertNode(figure);
      // Move cursor after the figure
      range.setStartAfter(figure);
      range.collapse(true);
      sel.removeAllRanges();
      sel.addRange(range);
    } else {
      editor.appendChild(figure);
    }

    // Add a paragraph after figure if it's the last element
    if (!figure.nextElementSibling) {
      const p = document.createElement('p');
      p.innerHTML = '<br>';
      figure.after(p);
    }

    updateWordCount();
  };
  reader.readAsDataURL(file);
}

// ── Paste images from clipboard ──
editor.addEventListener('paste', (e) => {
  const items = e.clipboardData?.items;
  if (!items) return;

  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const file = item.getAsFile();
      if (file) insertImageFile(file);
      return;
    }
  }
  // For text paste: let it through but clean up after
  setTimeout(() => {
    // Strip unwanted attributes from pasted HTML but keep formatting
    editor.querySelectorAll('[style]').forEach(el => {
      if (el.tagName !== 'IMG' && el.tagName !== 'FIGURE') {
        el.removeAttribute('style');
      }
    });
    updateWordCount();
  }, 0);
});

// ── Drag & drop images into editor ──
editor.addEventListener('dragover', (e) => {
  e.preventDefault();
  editor.style.borderColor = 'var(--accent)';
});
editor.addEventListener('dragleave', () => {
  editor.style.borderColor = '';
});
editor.addEventListener('drop', (e) => {
  e.preventDefault();
  editor.style.borderColor = '';
  const files = e.dataTransfer?.files;
  if (!files) return;

  for (const file of files) {
    if (file.type.startsWith('image/')) {
      // Place cursor at drop position
      const range = document.caretRangeFromPoint
        ? document.caretRangeFromPoint(e.clientX, e.clientY)
        : null;
      if (range) {
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
      }
      insertImageFile(file);
    }
  }
});

// ── Word count ──
function updateWordCount() {
  const text = editor.innerText.trim();
  const words = text ? text.split(/\s+/).length : 0;
  const mins = Math.ceil(words / 200);
  document.getElementById('wordCount').textContent = `${words} words · ${mins} min read`;
}

editor.addEventListener('input', updateWordCount);

// ── Helpers ──
function escHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function formatDate(str) {
  if (!str) return '';
  const d = new Date(str);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = isError ? '#f85149' : 'var(--green)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ── Keyboard shortcuts ──
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key === 's') {
    e.preventDefault();
    if (document.getElementById('editorForm').style.display !== 'none') {
      document.getElementById('editorForm').querySelector('form').requestSubmit();
    }
  }
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
    e.preventDefault();
    newArticle();
  }
});

// ── Get cleaned editor HTML ──
function getEditorContent() {
  const clone = editor.cloneNode(true);
  // Remove any contenteditable attributes from figcaptions
  clone.querySelectorAll('[contenteditable]').forEach(el => el.removeAttribute('contenteditable'));
  // Remove empty figcaptions
  clone.querySelectorAll('figcaption').forEach(fc => {
    if (!fc.textContent.trim()) fc.remove();
  });
  // Remove data-placeholder attributes
  clone.querySelectorAll('[data-placeholder]').forEach(el => el.removeAttribute('data-placeholder'));
  return clone.innerHTML.trim();
}

// ── Drag & drop cover image ──
const coverArea = document.getElementById('coverArea');
coverArea.addEventListener('dragover', (e) => { e.preventDefault(); coverArea.style.borderColor = 'var(--accent)'; });
coverArea.addEventListener('dragleave', () => { coverArea.style.borderColor = ''; });
coverArea.addEventListener('drop', (e) => {
  e.preventDefault();
  coverArea.style.borderColor = '';
  const file = e.dataTransfer.files[0];
  if (file && file.type.startsWith('image/')) {
    const input = document.getElementById('coverInput');
    const dt = new DataTransfer();
    dt.items.add(file);
    input.files = dt.files;
    previewCover(input);
  }
});

// ── Init ──
loadArticles();
</script>
