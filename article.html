<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading... — Inflex Trades</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="inflex.css">
<style>
  body {
    background: #fff;
  }

  /* ── Top nav ── */
  .article-nav {
    border-bottom: 1px solid #e8e4df;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(8px);
    z-index: 50;
  }
  .article-nav-logo {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #1a1a18;
    text-decoration: none;
  }
  .article-nav-links {
    display: flex;
    gap: 20px;
    list-style: none;
  }
  .article-nav-links a {
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    color: #666;
    text-decoration: none;
    font-weight: 500;
  }
  .article-nav-links a:hover { color: #1a1a18; }
  .subscribe-btn {
    background: #c8001a;
    color: #fff;
    border: none;
    padding: 7px 18px;
    border-radius: 4px;
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
  }
  .subscribe-btn:hover { background: #a5001a; }

  /* ── Article container ── */
  .article-container {
    max-width: 680px;
    margin: 0 auto;
    padding: 48px 24px 40px;
  }

  /* ── Header ── */
  .article-tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #c8001a;
    margin-bottom: 16px;
  }
  .article-title {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    font-weight: 900;
    line-height: 1.12;
    color: #1a1a18;
    margin-bottom: 16px;
    letter-spacing: -0.5px;
  }
  .article-subtitle {
    font-size: 20px;
    color: #555;
    line-height: 1.5;
    margin-bottom: 28px;
    font-weight: 400;
  }

  /* ── Author row (Substack style) ── */
  .author-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding-bottom: 24px;
    border-bottom: 1px solid #e8e4df;
    margin-bottom: 32px;
  }
  .author-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #c8001a 0%, #1a1a18 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #fff;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 18px;
    flex-shrink: 0;
  }
  .author-info { flex: 1; }
  .author-name {
    font-weight: 600;
    font-size: 15px;
    color: #1a1a18;
  }
  .author-details {
    font-size: 13px;
    color: #888;
    margin-top: 2px;
  }
  .author-details span { margin-right: 6px; }

  /* ── Cover image (full-bleed) ── */
  .article-cover-wrap {
    margin: 0 -24px 36px;
  }
  .article-cover {
    width: 100%;
    display: block;
  }

  /* ── Article body — Substack typography ── */
  .article-body {
    font-family: 'Barlow', sans-serif;
    font-size: 18px;
    line-height: 1.85;
    color: #292929;
    word-wrap: break-word;
  }
  .article-body h2 {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    line-height: 1.2;
    margin: 48px 0 16px;
    color: #1a1a18;
  }
  .article-body h3 {
    font-family: 'Barlow', sans-serif;
    font-size: 22px;
    font-weight: 700;
    line-height: 1.3;
    margin: 40px 0 12px;
    color: #1a1a18;
  }
  .article-body p {
    margin-bottom: 22px;
  }
  .article-body strong {
    font-weight: 700;
    color: #1a1a18;
  }
  .article-body em {
    font-style: italic;
  }
  .article-body a {
    color: #c8001a;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
  .article-body a:hover {
    color: #a5001a;
  }

  /* ── Blockquote ── */
  .article-body blockquote {
    border-left: 3px solid #c8001a;
    padding: 4px 0 4px 24px;
    margin: 32px 0;
    color: #555;
    font-size: 19px;
    font-style: italic;
    line-height: 1.7;
  }
  .article-body blockquote p {
    margin-bottom: 8px;
  }

  /* ── Lists ── */
  .article-body ul, .article-body ol {
    margin: 20px 0;
    padding-left: 28px;
  }
  .article-body li {
    margin-bottom: 10px;
    line-height: 1.7;
  }

  /* ── Images (Substack-style: wider than text) ── */
  .article-body img {
    display: block;
    max-width: calc(100% + 80px);
    margin: 36px -40px;
    border-radius: 0;
  }
  .article-body figure {
    margin: 36px -40px;
  }
  .article-body figure img {
    width: 100%;
    margin: 0;
    display: block;
  }
  .article-body figcaption {
    font-size: 14px;
    color: #999;
    text-align: center;
    margin-top: 10px;
    padding: 0 40px;
    font-style: italic;
    line-height: 1.5;
  }

  /* ── Code ── */
  .article-body code {
    background: #f3f0ec;
    padding: 2px 7px;
    border-radius: 3px;
    font-size: 0.88em;
    font-family: 'SF Mono', 'Fira Code', monospace;
    color: #c8001a;
  }
  .article-body pre {
    background: #1a1a18;
    color: #e6e6e6;
    padding: 24px;
    border-radius: 8px;
    overflow-x: auto;
    margin: 32px 0;
    font-size: 14px;
    line-height: 1.6;
  }
  .article-body pre code {
    background: none;
    padding: 0;
    color: #e6e6e6;
    font-size: 14px;
  }

  /* ── Horizontal rule ── */
  .article-body hr {
    border: none;
    height: 1px;
    background: #e8e4df;
    margin: 40px 0;
  }

  /* ── Divider (three dots — Substack style) ── */
  .article-divider {
    text-align: center;
    margin: 40px 0;
    color: #ccc;
    font-size: 24px;
    letter-spacing: 12px;
  }

  /* ── Footer CTA ── */
  .article-footer {
    margin-top: 48px;
    padding-top: 32px;
    border-top: 1px solid #e8e4df;
  }
  .article-footer-cta {
    background: #faf8f4;
    border: 1px solid #e8e4df;
    border-radius: 8px;
    padding: 32px;
    text-align: center;
  }
  .article-footer-cta h3 {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    color: #1a1a18;
    margin-bottom: 8px;
  }
  .article-footer-cta p {
    font-size: 15px;
    color: #666;
    margin-bottom: 20px;
    line-height: 1.5;
  }
  .cta-subscribe {
    display: inline-block;
    background: #c8001a;
    color: #fff;
    padding: 12px 32px;
    border-radius: 5px;
    font-weight: 600;
    font-size: 15px;
    text-decoration: none;
  }
  .cta-subscribe:hover { background: #a5001a; }

  /* ── Back to top ── */
  .back-home {
    display: block;
    text-align: center;
    margin-top: 32px;
    padding-bottom: 48px;
    font-size: 14px;
    font-weight: 600;
    color: #c8001a;
    text-decoration: none;
  }
  .back-home:hover { text-decoration: underline; }

  /* ── Not found ── */
  .article-not-found {
    text-align: center;
    padding: 100px 24px;
    color: #888;
    font-size: 18px;
  }
  .article-not-found a {
    color: #c8001a;
  }

  /* ── Responsive ── */
  @media (max-width: 720px) {
    .article-title { font-size: 32px; }
    .article-subtitle { font-size: 17px; }
    .article-container { padding: 32px 20px 40px; }
    .article-body { font-size: 17px; }
    .article-body img {
      max-width: calc(100% + 40px);
      margin: 28px -20px;
    }
    .article-body figure {
      margin: 28px -20px;
    }
    .article-body figcaption {
      padding: 0 20px;
    }
    .article-cover-wrap {
      margin: 0 -20px 28px;
    }
  }

  @media (max-width: 480px) {
    .article-title { font-size: 26px; }
    .article-body img {
      max-width: 100%;
      margin: 24px 0;
      border-radius: 6px;
    }
    .article-body figure {
      margin: 24px 0;
    }
    .article-body figcaption {
      padding: 0;
    }
    .article-cover-wrap {
      margin: 0 0 24px;
    }
  }
</style>
</head>
<body>

<!-- Nav -->
<div class="article-nav">
  <a href="/" class="article-nav-logo">Inflex Trades</a>
  <div style="display:flex;align-items:center;gap:16px;">
    <ul class="article-nav-links">
      <li><a href="/#insights">Insights</a></li>
      <li><a href="/#about">About</a></li>
    </ul>
    <a href="/#newsletter" class="subscribe-btn">Subscribe</a>
  </div>
</div>

<div class="article-container" id="articlePage">
  <div style="text-align:center;padding:80px;color:#888;">Loading article...</div>
</div>

<script>
async function loadArticle() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('slug');

  if (!slug) {
    document.getElementById('articlePage').innerHTML =
      '<div class="article-not-found">No article specified. <a href="/">Go back home</a></div>';
    return;
  }

  try {
    const res = await fetch(`/api/articles/${encodeURIComponent(slug)}`);
    if (!res.ok) throw new Error('Not found');
    const a = await res.json();

    document.title = `${a.title} — Inflex Trades`;

    let html = '';

    // Tag
    if (a.tag) {
      html += `<div class="article-tag">${esc(a.tag)}</div>`;
    }

    // Title
    html += `<h1 class="article-title">${esc(a.title)}</h1>`;

    // Excerpt as subtitle
    if (a.excerpt) {
      html += `<p class="article-subtitle">${esc(a.excerpt)}</p>`;
    }

    // Author row
    const authorName = a.author || 'Inflex Research';
    const initials = authorName.split(' ').map(w => w[0]).join('').substring(0, 2).toUpperCase();
    html += `
      <div class="author-row">
        <div class="author-avatar">${initials}</div>
        <div class="author-info">
          <div class="author-name">${esc(authorName)}</div>
          <div class="author-details">
            <span>${formatDate(a.created_at)}</span>
            ${a.read_time ? `<span>·</span><span>${esc(a.read_time)}</span>` : ''}
          </div>
        </div>
      </div>`;

    // Cover image (full-bleed)
    if (a.cover_image) {
      html += `<div class="article-cover-wrap"><img class="article-cover" src="${escAttr(a.cover_image)}" alt=""></div>`;
    }

    // Body
    html += `<div class="article-body">${a.content}</div>`;

    // Footer CTA
    html += `
      <div class="article-footer">
        <div class="article-footer-cta">
          <h3>Enjoyed this piece?</h3>
          <p>Get research like this delivered to your inbox every week — free, no spam.</p>
          <a href="/#newsletter" class="cta-subscribe">Subscribe to Inflex</a>
        </div>
      </div>
      <a href="/" class="back-home">← Back to all articles</a>`;

    document.getElementById('articlePage').innerHTML = html;
  } catch (e) {
    document.getElementById('articlePage').innerHTML =
      '<div class="article-not-found">Article not found. <a href="/">Go back home</a></div>';
  }
}

function esc(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}

function escAttr(text) {
  return text.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatDate(str) {
  if (!str) return '';
  const d = new Date(str);
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

loadArticle();
</script>
</body>
</html>
